services:
  - type: web
    name: yt-downloader
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 600 --keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
